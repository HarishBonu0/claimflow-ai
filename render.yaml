services:
  - type: web
    name: claimflow-api
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: VECTOR_BACKEND
        value: chroma_local
      - key: AUTH_SESSION_HOURS
        value: "168"
      - key: RATE_LIMIT_AUTH_PER_MIN
        value: "20"
      - key: RATE_LIMIT_CHAT_PER_MIN
        value: "60"
      - key: RATE_LIMIT_UPLOAD_PER_MIN
        value: "15"
      - key: RATE_LIMIT_VOICE_PER_MIN
        value: "20"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
